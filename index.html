<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-Vault</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/sweetalert-theme.css" />
  <link rel="stylesheet" href="css/themes.css" /> 

  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <!-- Script per il tema -->
  <script>
    (function(){ try {
      var t = localStorage.getItem('dvault_theme') || 'vault';
      document.documentElement.setAttribute('data-theme', t);
    } catch(_){} })();
  </script>

  <!-- Libreria per i popup carini (SweetAlert2) -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="js/main.js"></script>
  
</head>
<body class="landing-page">

  <!-- Background -->
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="bg-vignette"></div>

  <!-- Particelle animate molto belle -->
  <div class="particles" id="particles"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="logo-emblem">⚔</div>
  </header>

  <!-- Selezione eroe-->
  <main class="hero">
    <div class="hero-content">
      <p class="hero-eyebrow">Benvenuto nel</p>
      <h1 class="hero-title">
        <span class="title-d">D</span><span class="title-dash">—</span><span class="title-vault">Vault</span>
      </h1>
      <p class="hero-subtitle">Il tuo archivio segreto per campagne, schede e avventure</p>
      <div class="hero-divider">
        <span class="divider-gem">◆</span>
      </div>
    </div>

    <!-- Login e registrazione -->
    <div class="auth-container">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Accedi</button>
        <button class="auth-tab" data-tab="register">Registrati</button>
      </div>

      <div class="auth-form-wrapper">
        <!-- MESSAGGIO DEL SERVER -->
        <div id="auth-message" style="text-align: center; font-weight: bold; margin-bottom: 15px; min-height: 20px;"></div>

        <!-- LOGIN -->
        <form class="auth-form active" id="login-form" autocomplete="off">
          <div class="form-group">
            <label for="login-email">Email o Username</label>
            <input type="text" id="login-email" name="identifier" placeholder="eroe@regno.com" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-primary">
            <span class="btn-icon">🗝</span> Entra nel Vault
          </button>
          <p class="form-note"><a href="#" id="forgot-link">Password dimenticata?</a></p>
        </form>

        <!-- REGISTER -->
        <form class="auth-form" id="register-form" autocomplete="off"> 
          <!-- Si assicura che si aggiusti in base al dispositivo-->
          <div class="responsive-flex-row" style="display: flex; gap: 10px;"></div>
            <div class="form-group">
             <label for="reg-fullname">Nome e Cognome</label>
             <input type="text" id="reg-fullname" name="fullName" placeholder="Il tuo vero nome" required />
          </div>

          <div class="form-group">
            <label for="reg-username">Username (Nome nel Vault)</label>
            <input type="text" id="reg-username" name="username" placeholder="Es. DM_Morgana" required />
          </div>

          <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
              <label for="reg-email">Email</label>
              <input type="email" id="reg-email" name="email" placeholder="eroe@regno.com" required />
            </div>
            <div class="form-group" style="flex: 1;">
              <label for="reg-email-confirm">Conferma Email</label>
              <input type="email" id="reg-email-confirm" name="confirmEmail" placeholder="Ripeti email" required />
            </div>
          </div>

          <div class="form-group">
            <label for="reg-gender">Identità (Per l'avatar base)</label>
            <select id="reg-gender" name="gender" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.6); color: white; border: 1px solid var(--gold-dim); border-radius: 4px; font-family: 'Crimson Text', serif;" required>
              <option value="m">Uomo</option>
              <option value="f">Donna</option>
              <option value="n">Non specificato</option>
            </select>
          </div>

          <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" name="password" placeholder="••••••••" required />
            </div>
            <div class="form-group" style="flex: 1;">
              <label for="reg-confirm">Conferma</label>
              <input type="password" id="reg-confirm" name="confirm" placeholder="••••••••" required />
            </div>
          </div>

          <button type="submit" class="btn-primary" style="margin-top: 10px;"> Crea il tuo Account</button>
        </form>

        <!-- RECUPERO PASSWORD -->
        <form class="auth-form" id="reset-form" autocomplete="off">
          <h3 style="color: #e8c97e; text-align: center; margin-bottom: 15px; font-family: 'Cinzel', serif;">Recupera Password</h3>
          <div class="form-group">
            <label for="reset-username">Il tuo Username</label>
            <input type="text" id="reset-username" name="username" placeholder="NomeDellEroe" required />
          </div>
          <div class="form-group">
            <label for="reset-email">La tua Email</label>
            <input type="email" id="reset-email" name="email" placeholder="eroe@regno.com" required />
          </div>
          <div class="form-group">
            <label for="reset-new-password">Nuova Password</label>
            <input type="password" id="reset-new-password" name="newPassword" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-primary"> Reimposta Password </button>
          <p class="form-note"><a href="#" id="back-to-login">← Torna al Login</a></p>
        </form>

      </div>
    </div>

    <!-- Roba temporanea per far vedere com'è il sito post login -->
    <div class="demo-link">
      <a href="dashboard.html" class="btn-ghost">Anteprima Dashboard →</a>
    </div>
  </main>

  <!-- Parte sotto per evitare copyright -->
  <footer class="site-footer">
    <p>D-Vault &copy; 2025 &nbsp;·&nbsp; Dungeons & Dragons è un marchio registrato di Wizards of the Coast</p>
  </footer>

</body>
</html>
