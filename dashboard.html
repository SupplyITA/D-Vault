<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-Vault — Dashboard</title>
  
  <!-- CSS Base -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- FontAwesome (per mettere l'occhio sbarrato per il codice invito) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Librerie Esterne: Leaflet (Mappe) e Vue.js (Reattività) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    /* Stili per le nuove sezioni Dettaglio */
    .detail-section { padding: 40px; color: white; display: none; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    /* Menu a Tab per la Campagna */
    .campaign-tabs { display: flex; gap: 20px; margin: 20px 0; border-bottom: 2px solid #444; padding-bottom: 10px; }
    .tab-btn { background: none; color: #aaa; border: none; font-size: 1.2rem; cursor: pointer; font-family: 'Cinzel', serif; transition: color 0.2s; }
    .tab-btn.active { color: #e8c97e; border-bottom: 2px solid #e8c97e; padding-bottom: 5px; }
    .tab-btn:hover { color: #fff; }
    .tab-content { padding: 20px 0; display: none; }
    .tab-content.active { display: block; }
    
    /* Area di testo per la Storia */
    .story-textarea { width: 100%; height: 300px; background: #1a1a1a; color: #eee; border: 1px solid #444; padding: 15px; border-radius: 8px; font-family: 'Crimson Text', serif; font-size: 1.1rem; resize: vertical; }
    
    /* Effetto Hover Mappa */
    .map-hover-effect { border: 2px solid #444; border-radius: 8px; overflow: hidden; transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: crosshair; }
    .map-hover-effect:hover { transform: scale(1.02); box-shadow: 0 0 20px #e8c97e; border-color: #e8c97e; }
    
    /* Reattività Vue Box */
    .vue-stats-box { background: rgba(0,0,0,0.5); padding: 15px; border-left: 4px solid #8b1a1a; margin-bottom: 20px; border-radius: 4px; }
    .vue-stats-box input { width: 60px; padding: 5px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; margin-left: 10px; }
    
    /* Tabella Bestiario XML */
    .bestiario-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    .bestiario-table th, .bestiario-table td { border: 1px solid #444; padding: 10px; text-align: left; }
    .bestiario-table th { background: #8b1a1a; color: white; font-family: 'Cinzel', serif; }
  </style>
</head>
<body class="dashboard-page">

  <div class="dash-bg"></div>
  <div class="dash-bg-overlay"></div>

  <!-- Navbar originale -->
  <nav class="navbar">
    <a href="dashboard.html" class="nav-logo"> 
      <span class="nav-logo-icon">⚔</span>
      <span class="nav-logo-text">D-Vault</span>
    </a>
    <div class="nav-center"><span class="nav-section">— Archivio —</span></div>
    <div class="nav-right">
      <span class="nav-username" id="nav-username">Avventuriero</span>
      <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span><span></span><span></span></button>
      <div class="dropdown-menu" id="dropdown-menu">
        <div class="dropdown-section">
          <p class="dropdown-label">Le mie Schede</p>
          <ul id="dropdown-sheets-list"></ul>
          <button class="dropdown-add-btn" id="btn-add-sheet">+ Aggiungi Scheda</button>
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-section">
          <p class="dropdown-label">Le mie Campagne</p>
          <ul id="dropdown-campaigns-list"></ul>
          <button class="dropdown-add-btn" id="btn-add-campaign">+ Nuova Campagna</button>
          <button class="dropdown-add-btn" id="btn-join-campaign-dd" style="margin-top: 5px; color: #e8c97e; border-color: #e8c97e;">Unisciti con Codice</button>
        </div>
        <div class="dropdown-divider"></div>
        <a href="index.html" class="dropdown-logout">🚪 Esci dal Vault</a>
      </div>
    </div>
  </nav>

  <!-- MAIN: DIVISO IN 3 RIGHE -->
  <main class="dash-main" id="dash-main" style="display: flex; flex-direction: column; gap: 40px;">

    <!-- SEZIONE 1: EROI -->
    <section class="dashboard-section">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #4a90e2; padding-bottom: 10px; margin-bottom: 20px;">
        <h2 style="color: #4a90e2; font-family: 'Cinzel', serif; font-size: 1.5rem; margin: 0;">🛡️ I Miei Eroi</h2>
        <button class="btn-primary" id="btn-add-sheet-main" style="padding: 5px 15px; font-size: 0.9rem;">+ Forgia Eroe</button>
      </div>
      <!-- IL TRUCCO È QUI SOTTO: style="display: grid; ..." forza l'allineamento perfetto -->
      <div class="content-grid" id="grid-heroes" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-items: stretch;"></div>
    </section>

    <!-- SEZIONE 2: CAMPAGNE MASTER -->
    <section class="dashboard-section">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #8b1a1a; padding-bottom: 10px; margin-bottom: 20px;">
        <h2 style="color: #e8c97e; font-family: 'Cinzel', serif; font-size: 1.5rem; margin: 0;">👑 Le Mie Campagne (Master)</h2>
        <button class="btn-primary" id="btn-add-camp-main" style="padding: 5px 15px; font-size: 0.9rem;">+ Nuova Campagna</button>
      </div>
      <div class="content-grid" id="grid-master" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-items: stretch;"></div>
    </section>

    <!-- SEZIONE 3: CAMPAGNE GIOCATORE -->
    <section class="dashboard-section">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #27ae60; padding-bottom: 10px; margin-bottom: 20px;">
        <h2 style="color: #27ae60; font-family: 'Cinzel', serif; font-size: 1.5rem; margin: 0;">🎲 Avventure in Corso (Giocatore)</h2>
        <button class="btn-primary" id="btn-join-camp-main" style="padding: 5px 15px; font-size: 0.9rem;">🔗 Unisciti con Codice</button>
      </div>
      <div class="content-grid" id="grid-player" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-items: stretch;"></div>
    </section>

  </main>

  <!-- Mod Scelta Ruolo -->
  <!-- <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <h3 class="modal-title">Chi sei in questa avventura?</h3>
      <div class="modal-choices">
        <div class="modal-choice" id="choice-player"><div class="choice-icon">🛡</div><div class="choice-label">Player</div></div>
        <div class="modal-divider"></div>
        <div class="modal-choice" id="choice-master"><div class="choice-icon">📖</div><div class="choice-label">Dungeon Master</div></div>
      </div>
    </div>
  </div> -->

  <!-- Mod Scheda -->
  <div class="modal-backdrop" id="modal-sheet-backdrop">
    <div class="modal-form-box">
      <button class="modal-close" id="modal-sheet-close">✕</button>
      <h3 class="modal-title">Nuova Scheda Personaggio</h3>
      <form id="form-add-sheet" class="modal-form">
        <div class="form-row">
          <div class="form-group"><label>Nome Personaggio</label><input type="text" name="charName" required /></div>
          <div class="form-group"><label>Classe</label><select name="charClass"><option>Guerriero</option><option>Mago</option><option>Ladro</option><option>Chierico</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Razza</label><input type="text" name="charRace" /></div>
          <div class="form-group"><label>Livello</label><input type="number" name="charLevel" min="1" max="20" value="1" /></div>
        </div>
        <div class="modal-form-actions">
          <button type="button" class="btn-ghost" id="btn-sheet-cancel">Annulla</button>
          <button type="submit" class="btn-primary">✦ Salva</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Mod Campagna -->
  <div class="modal-backdrop" id="modal-campaign-backdrop">
    <div class="modal-form-box">
      <button class="modal-close" id="modal-campaign-close">✕</button>
      <h3 class="modal-title">Nuova Campagna</h3>
      <form id="form-add-campaign" class="modal-form">
        <div class="form-group full"><label>Nome Campagna</label><input type="text" name="campName" required /></div>
        <div class="form-group full"><label>Ambientazione</label><input type="text" name="campSetting" /></div>
        <div class="modal-form-actions">
          <button type="button" class="btn-ghost" id="btn-campaign-cancel">Annulla</button>
          <button type="submit" class="btn-primary">✦ Crea</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Mod Unisciti -->
  <div class="modal-backdrop" id="modal-join-backdrop">
    <div class="modal-form-box">
      <button class="modal-close" id="modal-join-close">✕</button>
      <h3 class="modal-title">Unisciti all'Avventura</h3>
      <form id="form-join-campaign" class="modal-form">
        <div class="form-group full"><label>Codice Invito</label><input type="text" name="inviteCode" required /></div>
        <div class="modal-form-actions">
          <button type="button" class="btn-ghost" id="btn-join-cancel">Annulla</button>
          <button type="submit" class="btn-primary">✦ Entra</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  
  <!-- Libreria per i popup carini (SweetAlert2) -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="js/dashboard.js"></script>
  <!--Questa parte è per la chat, lo scrivo così se lo cerchiamo per debuggare è più facile, l'ho messo in fondo apposta-->

</body>
</html>
